quotes:
    - "Всё великое земное создано в одиночестве."
    - "Мышление — это работа, которая не дает немедленных результатов."
    - "Тот, кто задает вопрос, дурак на пять минут; тот, кто не задает, остается дураком на всю жизнь."
    - "Чтобы плыть против течения, рыба должна быть сильной, плыть по течению может и мертвая рыба."
    - "Свобода — это не то, что вам дали. Это то, что у вас нельзя отнять."
    - "Если вы не можете объяснить это просто, вы сами этого не понимаете."
    - "Легче одурачить людей, чем убедить их в том, что они одурачены."
    - "Хаос — это просто порядок, который мы еще не научились понимать."
    - "Тот, у кого есть 'зачем' жить, может вынести почти любое 'как'."
    - "Знание говорит, но мудрость слушает."